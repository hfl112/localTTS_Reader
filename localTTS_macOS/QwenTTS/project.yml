name: QwenTTS
options:
  bundleIdPrefix: com.localtts
targets:
  QwenTTS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - QwenTTS
    settings:
      INFOPLIST_FILE: QwenTTS/Info.plist
      CODE_SIGN_ENTITLEMENTS: QwenTTS/QwenTTS.entitlements
      ENABLE_HARDENED_RUNTIME: YES
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      COMBINE_HIDPI_IMAGES: YES
      CLANG_ENABLE_OBJC_ARC: YES
      SWIFT_VERSION: "5.9"
